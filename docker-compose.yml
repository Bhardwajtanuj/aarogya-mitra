version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: aarogya-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: aarogya-mitra
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - aarogya-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aarogya-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/aarogya-mitra
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_change_in_production}
      - JWT_EXPIRE=7d
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - ML_SERVICE_URL=http://ml-service:5001
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - aarogya-network
    volumes:
      # For development: mount source code
      # - ./backend:/app
      # - /app/node_modules
      - backend_logs:/app/logs

  # ML Service (Flask)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: aarogya-ml-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - aarogya-network
    volumes:
      # For development: mount source code
      # - ./ml-service:/app
      - ml_models:/app/model

  # Frontend Service (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    container_name: aarogya-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - aarogya-network
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

# Networks
networks:
  aarogya-network:
    driver: bridge
    name: aarogya-network

# Volumes
volumes:
  mongodb_data:
    name: aarogya-mongodb-data
  mongodb_config:
    name: aarogya-mongodb-config
  backend_logs:
    name: aarogya-backend-logs
  ml_models:
    name: aarogya-ml-models
